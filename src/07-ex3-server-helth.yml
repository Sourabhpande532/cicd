name: Server Health Report
on: [push]

jobs:
  health-report:
    runs-on: ubuntu-latest
    steps:
      - name: Print Health Report
        run: |
          echo "📊 SERVER HEALTH REPORT"
          echo ""
          echo "Disk Usage:"
          df -h / | awk 'NR==2 {print $5}'
          echo ""
          echo "Memory Available:"
          free -h | awk '/^Mem:/ {print $7}'
          echo ""
          echo "CPU Cores:"
          nproc
          echo ""
          echo "Node Version:"
          node -v
          echo ""
          echo "Python Version:"
          python3 --version | awk '{print $2}'
          echo ""
          echo "Health Status:"
          echo "✅ HEALTHY"

# NOTE: here we use Linux commands like df, free, nproc, node -v, and python --version to extract system data.